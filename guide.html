<!DOCTYPE html>

<head>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #09090b; color: #f4f4f5; }
        .glass { background: rgba(24, 24, 27, 0.4); backdrop-filter: blur(20px); border: 1px solid rgba(63, 63, 70, 0.4); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .prose h1 { font-weight: 900; letter-spacing: -0.05em; color: white; margin-bottom: 2rem; border-bottom: 2px solid #4f46e5; padding-bottom: 1rem; }
        .prose h2 { font-weight: 800; letter-spacing: -0.02em; color: white; margin-top: 3rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem; }
        .prose h3 { font-weight: 800; color: #818cf8; margin-top: 2rem; margin-bottom: 1rem; }
        .prose p { color: #a1a1aa; line-height: 1.8; margin-bottom: 1.25rem; }
        .prose ul { list-style-type: none; padding-left: 0; }
        .prose li { position: relative; padding-left: 1.5rem; color: #d4d4d8; margin-bottom: 0.75rem; }
        .prose li::before { content: "→"; position: absolute; left: 0; color: #4f46e5; font-weight: bold; }
        .prose strong { color: white; font-weight: 700; }
        .prose hr { border: 0; border-top: 1px solid #27272a; margin: 4rem 0; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #09090b; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }
    </style>
</head>
<body class="selection:bg-indigo-500/30">
    <div class="fixed inset-0 pointer-events-none overflow-hidden">
        <div class="absolute -top-[20%] -left-[10%] w-[50%] h-[50%] bg-indigo-600/10 blur-[120px] rounded-full"></div>
        <div class="absolute -bottom-[20%] -right-[10%] w-[50%] h-[50%] bg-emerald-600/10 blur-[120px] rounded-full"></div>
    </div>

    <nav class="sticky top-0 z-50 glass border-b border-zinc-800/50">
        <div class="max-w-6xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-600/40">
                    <svg class="text-white w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1.1 12.1h-2.2v-2.2h2.2v2.2zM12 11.1c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z"/></svg>
                </div>

                </div>
            </div>
            <div class="flex gap-8 text-xs font-black uppercase tracking-widest text-zinc-500">

                <button onclick="loadContent('FEATURES.md')" class="hover:text-indigo-400 transition-colors">Features</button>
                <button onclick="loadContent('SYNC_GUIDE.md')" class="hover:text-indigo-400 transition-colors">Sync</button>

    <main class="max-w-4xl mx-auto px-6 py-20 relative">

    </main>

    <footer class="py-20 border-t border-zinc-900 bg-zinc-950/50">

            <div class="w-1 h-1 bg-zinc-800 rounded-full mx-auto"></div>
        </div>
    </footer>

    <script>
        async function loadContent(file) {
            const container = document.getElementById('content');
            
            // Special handling for the Landing Page (Home)
            if (file === 'LANDING') {
                container.innerHTML = `

                                </span>

                            </div>

                            <p class="text-xl text-zinc-400 max-w-2xl mx-auto font-medium">

                            </p>
                            <div class="flex items-center justify-center gap-6 pt-8">
                                <button onclick="window.scrollTo({ top: document.getElementById('pricing').offsetTop - 100, behavior: 'smooth' })" class="px-8 py-4 bg-indigo-600 hover:bg-indigo-500 text-white rounded-2xl font-black uppercase tracking-widest transition-all shadow-2xl shadow-indigo-600/30">Get Premium</button>
                                <button onclick="loadContent('FEATURES.md')" class="px-8 py-4 bg-zinc-900 border border-zinc-800 text-white rounded-2xl font-black uppercase tracking-widest hover:bg-zinc-800 transition-all">Explore Docs</button>
                            </div>
                        </div>

                        <!-- Features Grid -->
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                            <div class="p-8 bg-zinc-900/40 border border-zinc-800 rounded-3xl">
                                <div class="w-12 h-12 bg-indigo-500/10 rounded-2xl flex items-center justify-center text-indigo-500 mb-6">
                                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                                </div>
                                <h3 class="text-xl font-black mb-3 text-white">Semantic Search</h3>
                                <p class="text-sm text-zinc-500 font-medium">Search by concept, not just keywords. Our local neural engine understands your intent.</p>
                            </div>
                            <div class="p-8 bg-zinc-900/40 border border-zinc-800 rounded-3xl">
                                <div class="w-12 h-12 bg-emerald-500/10 rounded-2xl flex items-center justify-center text-emerald-500 mb-6">
                                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                                </div>
                                <h3 class="text-xl font-black mb-3 text-white">Local-First Privacy</h3>
                                <p class="text-sm text-zinc-500 font-medium">Your data never leaves your device unless you sync it via your own encrypted vault.</p>
                            </div>
                            <div class="p-8 bg-zinc-900/40 border border-zinc-800 rounded-3xl">
                                <div class="w-12 h-12 bg-amber-500/10 rounded-2xl flex items-center justify-center text-amber-500 mb-6">
                                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                                </div>
                                <h3 class="text-xl font-black mb-3 text-white">Cross-Cloud Sync</h3>
                                <p class="text-sm text-zinc-500 font-medium">Mirror your vault to Google Drive or private CouchDB instances with full E2EE.</p>
                            </div>
                        </div>

                        <!-- Pricing Section -->
                        <div id="pricing" class="space-y-12">
                            <div class="text-center space-y-4">
                                <h2 class="text-4xl font-black text-white">SIMPLE, TRANSPARENT PRICING</h2>
                                <p class="text-zinc-500 font-medium">Choose the plan that fits your intelligence needs.</p>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                                <!-- Monthly -->
                                <div class="p-10 bg-zinc-900/40 border border-zinc-800 rounded-3xl flex flex-col items-center">
                                    <span class="text-[10px] font-black uppercase tracking-widest text-zinc-500 mb-4">Monthly Subscription</span>
                                    <div class="text-5xl font-black text-white">$1.99<span class="text-lg text-zinc-600">/mo</span></div>
                                    <ul class="mt-10 space-y-4 text-sm text-zinc-400 font-medium flex-1">
                                        <li class="flex items-center gap-2">✓ Unlimited Semantic Search</li>
                                        <li class="flex items-center gap-2">✓ Full E2EE Sync</li>
                                        <li class="flex items-center gap-2">✓ Priority Neural Processing</li>
                                    </ul>
                                    <a href="https://toxminds.lemonsqueezy.com/checkout/buy/82831f38-6c76-403d-bfdb-4948bcc5abea" class="w-full mt-10 py-4 bg-zinc-800 hover:bg-zinc-700 text-white rounded-2xl font-black uppercase tracking-widest text-center transition-all">Buy Monthly</a>
                                </div>
                                <!-- Yearly -->
                                <div class="p-10 bg-indigo-600/10 border-2 border-indigo-600 rounded-3xl flex flex-col items-center relative overflow-hidden">
                                    <div class="absolute top-0 right-0 p-4">
                                        <span class="bg-indigo-600 text-[8px] font-black uppercase tracking-widest px-2 py-1 rounded-full">Best Value</span>
                                    </div>
                                    <span class="text-[10px] font-black uppercase tracking-widest text-indigo-400 mb-4">Yearly Subscription</span>
                                    <div class="text-5xl font-black text-white">$14.99<span class="text-lg text-zinc-600">/yr</span></div>
                                    <ul class="mt-10 space-y-4 text-sm text-zinc-300 font-medium flex-1">
                                        <li class="flex items-center gap-2">✓ Everything in Monthly</li>
                                        <li class="flex items-center gap-2">✓ 38% Savings annually</li>
                                        <li class="flex items-center gap-2">✓ Early Access to AI Lab</li>
                                    </ul>
                                    <a href="https://toxminds.lemonsqueezy.com/checkout/buy/b446dc9d-8f3d-4a48-b6f9-c77565d4dfec" class="w-full mt-10 py-4 bg-indigo-600 hover:bg-indigo-500 text-white rounded-2xl font-black uppercase tracking-widest text-center transition-all shadow-xl shadow-indigo-600/20">Buy Yearly</a>
                                </div>
                                <!-- Lifetime -->
                                <div class="p-10 bg-zinc-900/40 border border-zinc-800 rounded-3xl flex flex-col items-center">
                                    <span class="text-[10px] font-black uppercase tracking-widest text-zinc-500 mb-4">One-Time Payment</span>
                                    <div class="text-5xl font-black text-white">$49.99<span class="text-lg text-zinc-600">/once</span></div>
                                    <ul class="mt-10 space-y-4 text-sm text-zinc-400 font-medium flex-1">
                                        <li class="flex items-center gap-2">✓ Forever Ownership</li>
                                        <li class="flex items-center gap-2">✓ No Recurring Fees</li>
                                        <li class="flex items-center gap-2">✓ Lifetime Support</li>
                                    </ul>
                                    <a href="https://toxminds.lemonsqueezy.com/checkout/buy/4fe85453-d573-49a4-a890-c31d71738f56" class="w-full mt-10 py-4 bg-zinc-800 hover:bg-zinc-700 text-white rounded-2xl font-black uppercase tracking-widest text-center transition-all">Buy Lifetime</a>
                                </div>
                            </div>
                        </div>

                        <!-- Trust Section -->
                        <div class="p-12 glass rounded-[3rem] text-center space-y-6">
                            <h3 class="text-2xl font-black text-white uppercase tracking-widest">Fulfillment Information</h3>
                            <p class="text-zinc-400 max-w-2xl mx-auto italic">
                                "Brain Vault is a digital software product. Upon successful checkout, your license key is generated instantly by LemonSqueezy and displayed on the success page. You will also receive an automated email containing your unique access code for immediate activation within the browser extension."
                            </p>
                        </div>
                    </div>
                `;
                return;
            }

            // Special handling for Feedback page
            if (file === 'FEEDBACK') {
                container.innerHTML = `
                    <div class="space-y-12">
                        <div class="text-center space-y-4">
                            <div class="inline-flex items-center gap-2 px-3 py-1 bg-indigo-500/10 border border-indigo-500/20 rounded-full mb-2">
                                <span class="text-[10px] font-black uppercase tracking-widest text-indigo-400">Direct Line to the Dev</span>
                            </div>
                            <h1 class="text-5xl font-black tracking-tight text-white">Share Your <span class="text-indigo-500">Feedback</span></h1>
                            <p class="text-zinc-400 max-w-xl mx-auto font-medium">Your insight shapes Brain Vault. Bug reports, feature ideas, or just a note — all of it matters.</p>
                        </div>

                        <div class="p-10 glass rounded-[2.5rem] space-y-8 max-w-2xl mx-auto">
                            <!-- Star Rating -->
                            <div class="space-y-3">
                                <label class="text-[10px] font-black uppercase tracking-widest text-zinc-500">How would you rate Brain Vault?</label>
                                <div id="stars" class="flex gap-3 text-4xl cursor-pointer select-none">
                                    <span data-val="1" onclick="setRating(1)" class="star text-zinc-700 hover:text-yellow-400 transition-all">★</span>
                                    <span data-val="2" onclick="setRating(2)" class="star text-zinc-700 hover:text-yellow-400 transition-all">★</span>
                                    <span data-val="3" onclick="setRating(3)" class="star text-zinc-700 hover:text-yellow-400 transition-all">★</span>
                                    <span data-val="4" onclick="setRating(4)" class="star text-zinc-700 hover:text-yellow-400 transition-all">★</span>
                                    <span data-val="5" onclick="setRating(5)" class="star text-zinc-700 hover:text-yellow-400 transition-all">★</span>
                                </div>
                            </div>

                            <!-- Category -->
                            <div class="space-y-3">
                                <label class="text-[10px] font-black uppercase tracking-widest text-zinc-500">Category</label>
                                <div class="grid grid-cols-3 gap-3">
                                    <button onclick="setCategory('Bug Report')" id="cat-bug" class="cat-btn py-3 px-4 bg-zinc-900 border border-zinc-800 rounded-xl text-xs font-black text-zinc-400 hover:border-rose-500/50 hover:text-rose-400 transition-all">🐛 Bug Report</button>
                                    <button onclick="setCategory('Feature Request')" id="cat-feature" class="cat-btn py-3 px-4 bg-zinc-900 border border-zinc-800 rounded-xl text-xs font-black text-zinc-400 hover:border-indigo-500/50 hover:text-indigo-400 transition-all">✦ Feature Request</button>
                                    <button onclick="setCategory('General Feedback')" id="cat-general" class="cat-btn py-3 px-4 bg-zinc-900 border border-zinc-800 rounded-xl text-xs font-black text-zinc-400 hover:border-emerald-500/50 hover:text-emerald-400 transition-all">💬 General</button>
                                </div>
                            </div>

                            <!-- Message -->
                            <div class="space-y-3">
                                <label class="text-[10px] font-black uppercase tracking-widest text-zinc-500">Your Message</label>
                                <textarea id="fb-message" rows="5" placeholder="Describe your experience, idea, or issue in detail..." class="w-full bg-zinc-900 border border-zinc-800 rounded-2xl px-5 py-4 text-zinc-300 text-sm font-medium placeholder-zinc-700 focus:outline-none focus:border-indigo-500/50 transition-colors resize-none"></textarea>
                            </div>

                            <!-- Submit -->
                            <button onclick="submitFeedback()" class="w-full py-4 bg-indigo-600 hover:bg-indigo-500 text-white rounded-2xl font-black uppercase tracking-widest transition-all shadow-xl shadow-indigo-600/20 flex items-center justify-center gap-2">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
                                Submit via GitHub
                            </button>

                            <p class="text-center text-xs text-zinc-700 font-medium">Opens a pre-filled GitHub Issue in a new tab. A free GitHub account is required. You'll receive a reply directly on your issue thread.</p>
                        </div>
                    </div>
                `;

                // Inject feedback JS after rendering
                window._feedbackRating = 0;
                window._feedbackCategory = '';
                window.setRating = function(val) {
                    window._feedbackRating = val;
                    document.querySelectorAll('.star').forEach((s, i) => {
                        s.style.color = i < val ? '#facc15' : '#3f3f46';
                        s.style.transform = i < val ? 'scale(1.15)' : 'scale(1)';
                    });
                };
                window.setCategory = function(cat) {
                    window._feedbackCategory = cat;
                    document.querySelectorAll('.cat-btn').forEach(b => {
                        b.style.borderColor = '';
                        b.style.color = '';
                    });
                    const map = { 'Bug Report': 'cat-bug', 'Feature Request': 'cat-feature', 'General Feedback': 'cat-general' };
                    const btn = document.getElementById(map[cat]);
                    if (btn) { btn.style.borderColor = '#4f46e5'; btn.style.color = '#818cf8'; }
                };
                window.submitFeedback = function() {
                    const msg = document.getElementById('fb-message').value.trim();
                    if (!msg) { alert('Please enter a message before submitting.'); return; }
                    const rating = window._feedbackRating || 0;
                    const cat = window._feedbackCategory || 'General Feedback';
                    const stars = rating > 0 ? '★'.repeat(rating) + '☆'.repeat(5 - rating) : 'Not rated';
                    const title = encodeURIComponent('[' + cat + '] ' + (msg.length > 60 ? msg.substring(0, 60) + '...' : msg));
                    const body = encodeURIComponent('**Category:** ' + cat + '\n**Rating:** ' + stars + ' (' + (rating || 'N/A') + '/5)\n\n**Message:**\n' + msg + '\n\n---\n*Submitted via Brain Vault Guide Feedback Form*');
                    const label = encodeURIComponent(cat === 'Bug Report' ? 'bug' : cat === 'Feature Request' ? 'enhancement' : 'feedback');
                    window.open('https://github.com/ToxicMinds/Bookmark-Intelligence-Tool/issues/new?title=' + title + '&body=' + body + '&labels=' + label, '_blank');
                };
                return;
            }

            container.innerHTML = `
                <div class="flex flex-col items-center justify-center py-32 space-y-4 animate-pulse">
                    <div class="w-12 h-12 border-4 border-indigo-500/10 border-t-indigo-500/50 rounded-full animate-spin"></div>
                    <p class="text-xs font-black uppercase tracking-widest text-zinc-600">Syncing Intelligence...</p>
                </div>
            `;
            
            try {
                // Determine base path for the Markdown files
                const basePath = './docs/';
                
                const response = await fetch(basePath + file);
                if (!response.ok) throw new Error('Neural Link Offline');
                const text = await response.text();
                
                // Set the rendered HTML
                container.innerHTML = marked.parse(text);
                
                // Add appearance animation
                container.classList.remove('animate-in', 'fade-in', 'slide-in-from-bottom-6');
                void container.offsetWidth; // Trigger reflow
                container.classList.add('animate-in', 'fade-in', 'slide-in-from-bottom-6');
                
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } catch (err) {
                container.innerHTML = `
                    <div class="p-12 bg-rose-500/5 border border-rose-500/20 rounded-3xl text-center">
                        <h2 class="text-rose-500 font-black mb-2 uppercase tracking-widest text-xs">Access Fault</h2>
                        <p class="text-zinc-500 text-sm">Required neural pattern "${file}" not found in current memory.</p>
                    </div>
                `;
            }
        }

        // Handle URL parameters for deep-linking
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const page = params.get('page');
            if (page === 'sync') {
                loadContent('SYNC_GUIDE.md');
            } else if (page === 'features') {
                loadContent('FEATURES.md');
            } else if (page === 'feedback') {
                loadContent('FEEDBACK');
            } else {
                loadContent('LANDING');
            }
        };
    </script>
</body>
</html>
